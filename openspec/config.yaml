# OpenSpec Configuration — payroll
# Auto-generated by sdd-init on 2026-07-09

project:
  name: payroll
  display_name: "Distributed Payroll Processing Engine"
  version: "0.1.0"
  package_manager: pnpm@9.15.4
  monorepo:
    tool: nx
    version: "19.8.4"

stack:
  language: TypeScript
  version: "5.4"
  runtime: Node.js
  framework: NestJS
  framework_version: "10"
  build: "@nx/js:tsc"

architecture:
  patterns:
    - Domain-Driven Design
    - Clean Architecture
    - Hexagonal Architecture
    - CQRS
    - Event-Driven Architecture
    - Microservices
    - Database per Service
    - Transactional Outbox
    - Optimistic Locking
    - Idempotency
  messaging: Apache Kafka (kafkajs@2.2.4)
  databases:
    postgres:
      driver: pg@8.11
      purpose: Write-side (commands, consistency, business rules)
    mongodb:
      driver: mongodb@6.0
      purpose: Read-side (dashboards, reports, searches, projections)
    redis:
      purpose: Caching and idempotency keys

services:
  - name: auth-service
    port_env: AUTH_SERVICE_PORT
    default_port: 3001
  - name: employee-service
    port_env: EMPLOYEE_SERVICE_PORT
    default_port: 3002
  - name: payroll-service
    port_env: PAYROLL_SERVICE_PORT
    default_port: 3003
  - name: payroll-processing-service
    port_env: PAYROLL_PROCESSING_SERVICE_PORT
    default_port: 3004
  - name: payroll-projection-service
    port_env: PAYROLL_PROJECTION_SERVICE_PORT
    default_port: 3005
  - name: notification-service
    port_env: NOTIFICATION_SERVICE_PORT
    default_port: 3006
  - name: email-service
    port_env: EMAIL_SERVICE_PORT
    default_port: 3007
  - name: audit-service
    port_env: AUDIT_SERVICE_PORT
    default_port: 3008

libs:
  - shared-kernel (Entity, ValueObject, DomainEvent)
  - contracts (EventEnvelope, PayrollEventType)
  - event-bus (EventPublisher, EventHandler)
  - testing (test utilities)

testing:
  runner: Jest
  runner_version: "29.7"
  preset: "@nx/jest/preset"
  transformer: ts-jest
  transformer_version: "29.1"
  test_environment: node
  test_command: nx run-many -t test
  coverage_directory: coverage/
  coverage_reporter: default (json, html, text via Nx Jest)
  spec_pattern: "**/*.spec.ts"
  tsconfig: tsconfig.base.json (with app-specific tsconfig.app.json or tsconfig.lib.json)
  executor: "@nx/jest:jest"
  testing_lib: libs/testing (TestCompanyId and future utilities)
  test_files_exist: false
  notes: >
    No user test files found yet. All services and libraries are scaffold-level
    with only bootstrap source files. The project has a strong TDD mandate per
    project_context.md (Red/Green/Refactor cycle). Tests must be written before
    production code as per strict_tdd policy.

lint:
  tool: ESLint
  version: "8.57"
  config: eslint.config.js (Nx flat config)
  command: nx run-many -t lint

format:
  tool: Prettier
  version: "3.2"
  config: .prettierrc (singleQuote, trailingComma all, printWidth 100)
  command: prettier --write .

type_checker:
  tool: TypeScript
  config: tsconfig.base.json
  strict: true

strict_tdd: true
strict_tdd_reason: >
  Set via explicit user request. Matches project_context.md TDD mandate:
  "Tests are written before production code" (Red/Green/Refactor).
  All sdd-apply and sdd-verify phases MUST follow test-first discipline.

review_budget: 800
delivery_strategy: single-pr-default

persistence:
  mode: hybrid
  backends:
    - openspec (filesystem)
    - engram (memory)
